<!DOCTYPE html>\n<html lang="en">\n<head>\n    <meta charset="UTF-8">\n    <meta name="viewport" content="width=device-width, initial-scale=1.0">\n    <title>Game Tracker 2025-2026</title>\n    <style>\n        body { font-family: Arial, sans-serif; margin: 20px; }\n        h1 { text-align: center; }\n        .game-list { margin-top: 20px; }\n        .game-item { margin-bottom: 15px; padding: 10px; border: 1px solid #ddd; border-radius: 5px; }\n        .filter { margin-bottom: 20px; }\n    </style>\n</head>\n<body>\n    <h1>Game Tracker 2025-2026</h1>\n    <div class="filter">\n        <input type="text" id="search" placeholder="Search games...">\n        <select id="sort">\n            <option value="name">Sort by Name</option>\n            <option value="date">Sort by Release Date</option>\n        </select>\n    </div>\n    <div class="game-list" id="game-list">\n        <!-- Game items will be populated here -->\n    </div>\n    <script>\n        const games = [\n            { name: 'Game A', releaseDate: '2025-11-01', played: false },\n            { name: 'Game B', releaseDate: '2026-01-15', played: false }\n            // ... more games can be added here\n        ];\n\n        const gameList = document.getElementById('game-list');\n        const searchBox = document.getElementById('search');\n        const sortSelect = document.getElementById('sort');\n\n        function renderGames(games) {\n            gameList.innerHTML = '';\n            games.forEach(game => {\n                const gameItem = document.createElement('div');\n                gameItem.classList.add('game-item');\n                gameItem.innerHTML = `<strong>${game.name}</strong> (Released on: ${game.releaseDate})` +\n                    `<button onclick="markAsPlayed('${game.name}')">Mark as Played</button>`;\n                gameList.appendChild(gameItem);\n            });\n        }\n\n        function filterGames() {\n            let filteredGames = games;\n            const searchTerm = searchBox.value.toLowerCase();\n            filteredGames = filteredGames.filter(game => game.name.toLowerCase().includes(searchTerm));\n            renderGames(filteredGames);\n        }\n\n        function sortGames() {\n            let sortedGames = [...games];\n            if (sortSelect.value === 'date') {\n                sortedGames.sort((a, b) => new Date(a.releaseDate) - new Date(b.releaseDate));\n            } else {\n                sortedGames.sort((a, b) => a.name.localeCompare(b.name));\n            }\n            renderGames(sortedGames);\n        }\n\n        function markAsPlayed(gameName) {\n            const game = games.find(g => g.name === gameName);\n            if (game) {\n                game.played = !game.played;\n                alert(game.played ? `${gameName} marked as played.` : `${gameName} marked as not played.`);\n            }\n            renderGames(games);\n        }\n\n        searchBox.addEventListener('input', filterGames);\n        sortSelect.addEventListener('change', sortGames);\n\n        renderGames(games);\n    </script>\n</body>\n</html>\n

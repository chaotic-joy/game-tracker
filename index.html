<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Game Tracker 2025–2026</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --surface2: #16161f;
    --surface3: #1c1c28;
    --border: #2a2a3a;
    --border2: #363650;
    --text: #e8e8f0;
    --text2: #9090b0;
    --text3: #5a5a7a;
    --accent: #7c6af7;
    --accent2: #9f94ff;
    --accent-glow: rgba(124,106,247,0.25);
    --green: #3dd68c;
    --green-dim: rgba(61,214,140,0.15);
    --amber: #f5a623;
    --amber-dim: rgba(245,166,35,0.15);
    --red: #ff5e72;
    --red-dim: rgba(255,94,114,0.15);
    --cyan: #38c9d4;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Space Mono', monospace;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Subtle grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(124,106,247,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(124,106,247,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    max-width: 1400px;
    margin: 0 auto;
    padding: 0 24px 60px;
  }

  /* Header */
  header {
    padding: 48px 0 36px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 36px;
  }

  .header-inner {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    flex-wrap: wrap;
    gap: 16px;
  }

  .logo-block h1 {
    font-family: 'Syne', sans-serif;
    font-size: 2.4rem;
    font-weight: 800;
    letter-spacing: -0.03em;
    line-height: 1;
    color: var(--text);
  }

  .logo-block h1 span {
    color: var(--accent2);
  }

  .logo-block p {
    margin-top: 6px;
    font-size: 0.72rem;
    color: var(--text3);
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }

  .header-stats {
    display: flex;
    gap: 20px;
    flex-wrap: wrap;
  }

  .stat-pill {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 18px;
    text-align: center;
  }

  .stat-pill .num {
    font-family: 'Syne', sans-serif;
    font-size: 1.5rem;
    font-weight: 700;
    color: var(--accent2);
    display: block;
  }

  .stat-pill .label {
    font-size: 0.65rem;
    color: var(--text3);
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }

  /* Controls bar */
  .controls {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    align-items: center;
    margin-bottom: 28px;
  }

  .search-wrap {
    flex: 1;
    min-width: 220px;
    position: relative;
  }

  .search-wrap svg {
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text3);
    pointer-events: none;
  }

  .search-wrap input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px 10px 38px;
    color: var(--text);
    font-family: 'Space Mono', monospace;
    font-size: 0.78rem;
    outline: none;
    transition: border-color 0.2s;
  }

  .search-wrap input:focus { border-color: var(--accent); }
  .search-wrap input::placeholder { color: var(--text3); }

  .filter-group {
    display: flex;
    gap: 6px;
  }

  .filter-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 7px;
    padding: 8px 14px;
    color: var(--text2);
    font-family: 'Space Mono', monospace;
    font-size: 0.7rem;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }

  .filter-btn:hover { border-color: var(--accent); color: var(--text); }
  .filter-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }

  /* Section label */
  .section-label {
    font-family: 'Syne', sans-serif;
    font-size: 0.65rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.18em;
    color: var(--text3);
    margin-bottom: 14px;
    padding-left: 2px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .section-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* Year badge */
  .year-divider {
    display: flex;
    align-items: center;
    gap: 14px;
    margin: 32px 0 16px;
  }

  .year-badge {
    font-family: 'Syne', sans-serif;
    font-size: 0.72rem;
    font-weight: 700;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    padding: 4px 12px;
    border-radius: 4px;
    white-space: nowrap;
  }

  .year-badge.y2025 { background: var(--amber-dim); color: var(--amber); border: 1px solid rgba(245,166,35,0.3); }
  .year-badge.y2026 { background: var(--accent-glow); color: var(--accent2); border: 1px solid rgba(124,106,247,0.3); }

  .year-divider hr { flex: 1; border: none; border-top: 1px solid var(--border); }

  /* Table */
  .table-wrap {
    overflow-x: auto;
    border: 1px solid var(--border);
    border-radius: 12px;
    background: var(--surface);
  }

  table {
    width: 100%;
    border-collapse: collapse;
    min-width: 700px;
  }

  thead {
    background: var(--surface3);
    border-bottom: 1px solid var(--border2);
  }

  th {
    text-align: left;
    padding: 12px 16px;
    font-family: 'Space Mono', monospace;
    font-size: 0.62rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--text3);
    white-space: nowrap;
    cursor: pointer;
    user-select: none;
    transition: color 0.15s;
  }

  th:hover { color: var(--text); }
  th .sort-arrow { margin-left: 4px; opacity: 0.5; }
  th.sorted { color: var(--accent2); }
  th.sorted .sort-arrow { opacity: 1; }

  tbody tr {
    border-bottom: 1px solid var(--border);
    transition: background 0.12s;
    animation: fadeRow 0.3s ease both;
  }

  @keyframes fadeRow {
    from { opacity: 0; transform: translateY(4px); }
    to { opacity: 1; transform: translateY(0); }
  }

  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: var(--surface2); }
  tbody tr.in-list { background: rgba(124,106,247,0.04); }
  tbody tr.hidden { display: none; }

  td {
    padding: 13px 16px;
    font-size: 0.78rem;
    vertical-align: middle;
  }

  /* Rank col */
  .td-rank {
    color: var(--text3);
    font-size: 0.68rem;
    font-weight: 700;
    width: 40px;
  }

  /* Game name */
  .td-name {
    font-family: 'Syne', sans-serif;
    font-weight: 600;
    font-size: 0.88rem;
    max-width: 220px;
  }

  .td-name a {
    color: var(--text);
    text-decoration: none;
    display: flex;
    align-items: center;
    gap: 8px;
    transition: color 0.15s;
  }

  .td-name a:hover { color: var(--accent2); }

  .yt-icon {
    opacity: 0;
    transition: opacity 0.15s;
    flex-shrink: 0;
    color: var(--red);
  }

  tbody tr:hover .yt-icon { opacity: 1; }

  /* Genre tag */
  .genre-tag {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 0.62rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    white-space: nowrap;
    border: 1px solid;
  }

  /* Status */
  .status-badge {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 3px 9px;
    border-radius: 4px;
    font-size: 0.62rem;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    white-space: nowrap;
  }

  .status-badge.released { background: var(--green-dim); color: var(--green); border: 1px solid rgba(61,214,140,0.25); }
  .status-badge.upcoming { background: var(--accent-glow); color: var(--accent2); border: 1px solid rgba(124,106,247,0.25); }
  .status-badge.confirmed { background: var(--amber-dim); color: var(--amber); border: 1px solid rgba(245,166,35,0.25); }

  .status-dot {
    width: 5px; height: 5px;
    border-radius: 50%;
    display: inline-block;
  }

  .released .status-dot { background: var(--green); }
  .upcoming .status-dot { background: var(--accent2); animation: pulse 1.6s infinite; }
  .confirmed .status-dot { background: var(--amber); }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  /* Notes col */
  .td-notes {
    color: var(--text2);
    font-size: 0.72rem;
    line-height: 1.5;
    max-width: 340px;
  }

  /* Add to list button */
  .btn-list {
    background: transparent;
    border: 1px solid var(--border2);
    border-radius: 6px;
    padding: 6px 0;
    cursor: pointer;
    font-family: 'Space Mono', monospace;
    font-size: 0.62rem;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    transition: all 0.15s;
    white-space: nowrap;
    color: var(--text2);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 5px;
    width: 72px;
  }

  .btn-list:hover { border-color: var(--accent); color: var(--accent2); }
  .btn-list.added { background: var(--accent-glow); border-color: var(--accent); color: var(--accent2); }
  .btn-list.added:hover { background: var(--red-dim); border-color: var(--red); color: var(--red); }
  .btn-list.added:hover .btn-list-text::before { content: 'Remove'; }
  .btn-list.added .btn-list-text { position: relative; }
  .btn-list.added .btn-list-text span { display: none; }
  .btn-list.added .btn-list-text::before { content: 'Saved'; }

  /* My list panel */
  .mylist-panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 24px;
    margin-bottom: 32px;
    display: none;
  }

  .mylist-panel.visible { display: block; }

  .mylist-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 16px;
  }

  .mylist-header h2 {
    font-family: 'Syne', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    color: var(--accent2);
  }

  .btn-clear {
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 5px 12px;
    color: var(--text3);
    font-family: 'Space Mono', monospace;
    font-size: 0.62rem;
    cursor: pointer;
    transition: all 0.15s;
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }

  .btn-clear:hover { border-color: var(--red); color: var(--red); }

  .mylist-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }

  .mylist-chip {
    background: var(--surface2);
    border: 1px solid var(--border2);
    border-radius: 6px;
    padding: 6px 12px;
    font-size: 0.72rem;
    display: flex;
    align-items: center;
    gap: 8px;
    animation: chipIn 0.2s ease;
  }

  @keyframes chipIn {
    from { opacity: 0; transform: scale(0.9); }
    to { opacity: 1; transform: scale(1); }
  }

  .mylist-chip span { font-family: 'Syne', sans-serif; font-size: 0.8rem; font-weight: 600; }

  .chip-remove {
    background: none;
    border: none;
    color: var(--text3);
    cursor: pointer;
    font-size: 1rem;
    line-height: 1;
    padding: 0;
    transition: color 0.15s;
  }

  .chip-remove:hover { color: var(--red); }

  .mylist-empty {
    color: var(--text3);
    font-size: 0.75rem;
    font-style: italic;
  }

  /* Genre color mapping */
  .g-rpg { color: #a78bfa; border-color: rgba(167,139,250,0.3); background: rgba(167,139,250,0.08); }
  .g-action { color: #f97316; border-color: rgba(249,115,22,0.3); background: rgba(249,115,22,0.08); }
  .g-horror { color: #ef4444; border-color: rgba(239,68,68,0.3); background: rgba(239,68,68,0.08); }
  .g-fps { color: #22d3ee; border-color: rgba(34,211,238,0.3); background: rgba(34,211,238,0.08); }
  .g-platformer { color: #84cc16; border-color: rgba(132,204,22,0.3); background: rgba(132,204,22,0.08); }
  .g-strategy { color: #f59e0b; border-color: rgba(245,158,11,0.3); background: rgba(245,158,11,0.08); }
  .g-adventure { color: #10b981; border-color: rgba(16,185,129,0.3); background: rgba(16,185,129,0.08); }
  .g-metroidvania { color: #e879f9; border-color: rgba(232,121,249,0.3); background: rgba(232,121,249,0.08); }
  .g-racing { color: #facc15; border-color: rgba(250,204,21,0.3); background: rgba(250,204,21,0.08); }
  .g-soulslike { color: #fb923c; border-color: rgba(251,146,60,0.3); background: rgba(251,146,60,0.08); }
  .g-survival { color: #4ade80; border-color: rgba(74,222,128,0.3); background: rgba(74,222,128,0.08); }
  .g-openworld { color: #38bdf8; border-color: rgba(56,189,248,0.3); background: rgba(56,189,248,0.08); }

  /* Played row */
  tbody tr.played td.td-name a {
    color: var(--text3);
    text-decoration: line-through;
    text-decoration-color: var(--text3);
  }
  tbody tr.played { opacity: 0.55; }
  tbody tr.played:hover { opacity: 0.8; }

  .played-badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 2px 7px;
    border-radius: 4px;
    font-size: 0.6rem;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    background: rgba(61,214,140,0.1);
    color: var(--green);
    border: 1px solid rgba(61,214,140,0.25);
    margin-left: 6px;
    vertical-align: middle;
    white-space: nowrap;
  }

  /* Played button */
  .btn-played {
    background: transparent;
    border: 1px solid var(--border2);
    border-radius: 6px;
    padding: 6px 10px;
    cursor: pointer;
    font-family: 'Space Mono', monospace;
    font-size: 0.62rem;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    transition: all 0.15s;
    white-space: nowrap;
    color: var(--text3);
    display: flex;
    align-items: center;
    gap: 5px;
  }
  .btn-played:hover { border-color: var(--green); color: var(--green); }
  .btn-played.played { background: rgba(61,214,140,0.1); border-color: rgba(61,214,140,0.4); color: var(--green); }
  .btn-played.played:hover { background: var(--red-dim); border-color: var(--red); color: var(--red); }

  .actions-cell {
    display: flex;
    gap: 6px;
    align-items: center;
  }

  /* Chip played indicator */
  .chip-played-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--green);
    flex-shrink: 0;
    margin-right: 2px;
  }

  /* Empty state */
  .empty-state {
    text-align: center;
    padding: 48px 24px;
    color: var(--text3);
    font-size: 0.8rem;
    display: none;
  }

  .empty-state.visible { display: block; }

  /* MC score badge */
  .mc-badge {
    display: inline-block;
    padding: 2px 7px;
    border-radius: 4px;
    font-family: 'Syne', sans-serif;
    font-size: 0.75rem;
    font-weight: 700;
  }
  .mc-great { background: rgba(61,214,140,0.15); color: #3dd68c; border: 1px solid rgba(61,214,140,0.3); }
  .mc-good  { background: rgba(245,166,35,0.12);  color: #f5a623; border: 1px solid rgba(245,166,35,0.3); }
  .mc-ok    { background: rgba(255,94,114,0.1);   color: #ff7a89; border: 1px solid rgba(255,94,114,0.25); }

  /* Drag handle */
  .drag-handle {
    cursor: grab;
    color: var(--text3);
    padding: 0 2px;
    display: flex;
    align-items: center;
    user-select: none;
    flex-shrink: 0;
  }
  .drag-handle:active { cursor: grabbing; }

  .td-pos {
    color: var(--text3);
    font-size: 0.68rem;
    font-weight: 700;
    width: 48px;
    display: none;
  }
  .mylist-view .td-pos { display: table-cell; }

  .th-pos { display: none; }
  .mylist-view .th-pos { display: table-cell; }

  tbody tr.drag-over { outline: 1px solid var(--accent); background: var(--surface3) !important; }
  tbody tr.dragging { opacity: 0.4; }

  /* Back to top */
  .back-to-top {
    position: fixed;
    bottom: 32px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--surface2);
    border: 1px solid var(--border2);
    border-radius: 20px;
    padding: 8px 20px;
    color: var(--text2);
    font-family: 'Space Mono', monospace;
    font-size: 0.65rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 7px;
    transition: border-color 0.15s, color 0.15s;
    z-index: 100;
    white-space: nowrap;
  }
  .back-to-top:hover { border-color: var(--accent); color: var(--accent2); }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--accent); }

  /* Responsive */
  @media (max-width: 640px) {
    .logo-block h1 { font-size: 1.6rem; }
    .header-stats { gap: 10px; }
    .filter-group { flex-wrap: wrap; }
    td, th { padding: 10px 10px; }
  }
</style>
</head>
<body>
<div class="container">

  <header>
    <div class="header-inner">
      <div class="logo-block">
        <h1>GAME<span>TRACKER</span></h1>
        <p>2025 Released &amp; 2026 Upcoming · Single Player Edition</p>
      </div>
      <div class="header-stats">
        <div class="stat-pill">
          <span class="num" id="stat-total">0</span>
          <span class="label">Total Games</span>
        </div>
        <div class="stat-pill">
          <span class="num" id="stat-released">0</span>
          <span class="label">Released</span>
        </div>
        <div class="stat-pill">
          <span class="num" id="stat-upcoming">0</span>
          <span class="label">Upcoming</span>
        </div>
        <div class="stat-pill">
          <span class="num" id="stat-mylist">0</span>
          <span class="label">My List</span>
        </div>
        <div class="stat-pill">
          <span class="num" id="stat-played">0</span>
          <span class="label">Played</span>
        </div>
      </div>
    </div>
  </header>



  <!-- Controls -->
  <div class="controls">
    <div class="search-wrap">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input type="text" id="search" placeholder="Search games..." oninput="filterGames()" />
    </div>
    <div class="filter-group">
      <button class="filter-btn active" onclick="setFilter('all', this)">All</button>
      <button class="filter-btn" onclick="setFilter('2024', this)">2024</button>
      <button class="filter-btn" onclick="setFilter('2025', this)">2025</button>
      <button class="filter-btn" onclick="setFilter('released', this)">Released</button>
      <button class="filter-btn" onclick="setFilter('upcoming', this)">Upcoming</button>
      <button class="filter-btn" onclick="setFilter('mylist', this)">My List</button>
      <button class="filter-btn" onclick="setFilter('played', this)">✓ Played</button>
    </div>
  </div>

  <!-- Table -->
  <div class="section-label">Full Database</div>
  <div class="table-wrap">
    <table id="game-table">      <thead>
        <tr>
          <th class="th-pos">#</th>
          <th>List</th>
          <th onclick="sortTable('name')">Game<span class="sort-arrow">↕</span></th>
          <th onclick="sortTable('genre')">Genre<span class="sort-arrow">↕</span></th>
          <th onclick="sortTable('status')">Status<span class="sort-arrow">↕</span></th>
          <th onclick="sortTable('date')">Release<span class="sort-arrow">↕</span></th>
          <th onclick="sortTable('year')">Year<span class="sort-arrow">↕</span></th>
          <th onclick="sortTable('meta')" title="Metacritic Score">MC<span class="sort-arrow">↕</span></th>
          <th onclick="sortTable('hltb')" title="HowLongToBeat main story hours">HLTB<span class="sort-arrow">↕</span></th>
          <th>Notes</th>
          <th onclick="sortTable('played')">Played<span class="sort-arrow">↕</span></th>
        </tr>
      </thead>
      <tbody id="game-body"></tbody>
    </table>
    <div class="empty-state" id="empty-state">No games match your filter.</div>

let myList = JSON.parse(localStorage.getItem('gametracker_list') || '[]');
let playedList = JSON.parse(localStorage.getItem('gametracker_played') || '[]');
let currentFilter = 'all';
let sortCol = 'rank';
let sortDir = 1;

function ytUrl(name) {
  return 'https://www.youtube.com/results?search_query=' + encodeURIComponent(name);
}

function genreColor(gc) {
  const map = {
    'g-rpg': '#a78bfa', 'g-action': '#f97316', 'g-horror': '#ef4444',
    'g-fps': '#22d3ee', 'g-platformer': '#84cc16', 'g-strategy': '#f59e0b',
    'g-adventure': '#10b981', 'g-metroidvania': '#e879f9', 'g-racing': '#facc15',
    'g-soulslike': '#fb923c', 'g-survival': '#4ade80', 'g-openworld': '#38bdf8'
  };
  return map[gc] || '#9090b0';
}

function buildTable() {
  const tbody = document.getElementById('game-body');
  const search = document.getElementById('search').value.toLowerCase();

  let data = [...GAMES];

  // In mylist view, sort by myList order; otherwise use sort column
  if (currentFilter === 'mylist') {
    data.sort((a, b) => {
      const ai = myList.indexOf(a.name);
      const bi = myList.indexOf(b.name);
      if (ai === -1 && bi === -1) return 0;
      if (ai === -1) return 1;
      if (bi === -1) return -1;
      return ai - bi;
    });
  } else {
    data.sort((a, b) => {
      let va = a[sortCol], vb = b[sortCol];
      if (sortCol === 'rank') { va = a.rank; vb = b.rank; }
      // Push nulls to end regardless of direction
      if (va == null && vb == null) return 0;
      if (va == null) return 1;
      if (vb == null) return -1;
      if (typeof va === 'string') va = va.toLowerCase();
      if (typeof vb === 'string') vb = vb.toLowerCase();
      if (va < vb) return -1 * sortDir;
      if (va > vb) return 1 * sortDir;
      return 0;
    });
  }

  tbody.innerHTML = '';
  let visible = 0;

  data.forEach((g, idx) => {
    const inList = myList.includes(g.name);
    const isPlayed = playedList.includes(g.name);
    const matchSearch = !search || g.name.toLowerCase().includes(search) || g.genre.toLowerCase().includes(search) || g.notes.toLowerCase().includes(search);
    const matchFilter =
      currentFilter === 'all' ? true :
      currentFilter === '2024' ? g.year === 2024 :
      currentFilter === '2025' ? g.year === 2025 :
      currentFilter === 'released' ? g.status === 'released' :
      currentFilter === 'upcoming' ? (g.status === 'upcoming' || g.status === 'confirmed') :
      currentFilter === 'mylist' ? inList :
      currentFilter === 'played' ? isPlayed : true;

    const show = matchSearch && matchFilter;
    if (show) visible++;

    const statusLabel = g.status === 'released' ? 'Released' : g.status === 'upcoming' ? 'Upcoming' : 'Confirmed';
    const delay = (idx % 20) * 18;

    const tr = document.createElement('tr');
    const rowClass = [(inList ? 'in-list' : ''), (isPlayed ? 'played' : ''), (show ? '' : 'hidden')].filter(Boolean).join(' ');
    tr.className = rowClass;
    tr.style.animationDelay = `${delay}ms`;
    tr.dataset.name = g.name;
    const safeName = g.name.replace(/'/g, "\\'");
    const listPos = myList.indexOf(g.name);
    tr.draggable = inList;
    tr.innerHTML = `
      <td class="td-pos">${inList ? `<span style="display:flex;align-items:center;gap:6px"><svg class="drag-handle" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="5" r="1" fill="currentColor"/><circle cx="9" cy="12" r="1" fill="currentColor"/><circle cx="9" cy="19" r="1" fill="currentColor"/><circle cx="15" cy="5" r="1" fill="currentColor"/><circle cx="15" cy="12" r="1" fill="currentColor"/><circle cx="15" cy="19" r="1" fill="currentColor"/></svg>${listPos + 1}</span>` : ''}</td>
      <td>
        <div class="actions-cell">
          <button class="btn-list ${inList ? 'added' : ''}" onclick="toggleList('${safeName}', this)">
            <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="${inList ? 'M20 6L9 17l-5-5' : 'M12 5v14M5 12h14'}"/></svg>
            <span class="btn-list-text"><span>${inList ? '' : 'Add'}</span></span>
          </button>
        </div>
      </td>
      <td class="td-name">
        <a href="${ytUrl(g.name)}" target="_blank" rel="noopener">
          <svg class="yt-icon" width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M19.59 6.69a4.83 4.83 0 0 1-3.77-2.7A12.94 12.94 0 0 0 12 3.5a12.94 12.94 0 0 0-3.82.49 4.83 4.83 0 0 1-3.77 2.7A4.78 4.78 0 0 0 2 11v2a4.78 4.78 0 0 0 2.41 4.31 4.83 4.83 0 0 1 3.77 2.7A12.94 12.94 0 0 0 12 20.5a12.94 12.94 0 0 0 3.82-.49 4.83 4.83 0 0 1 3.77-2.7A4.78 4.78 0 0 0 22 13v-2a4.78 4.78 0 0 0-2.41-4.31zM10 15.5v-7l6 3.5-6 3.5z"/></svg>
          ${g.name}${isPlayed ? '<span class="played-badge">✓ Played</span>' : ''}
        </a>
      </td>
      <td><span class="genre-tag ${g.genreClass}">${g.genre}</span></td>
      <td><span class="status-badge ${g.status}"><span class="status-dot"></span>${statusLabel}</span></td>
      <td style="color:var(--text2);font-size:0.72rem;white-space:nowrap">${g.date}</td>
      <td style="color:var(--text3);font-size:0.68rem;font-weight:700;white-space:nowrap">${g.year}</td>
      <td style="white-space:nowrap">${g.meta != null ? `<span class="mc-badge mc-${g.meta >= 90 ? 'great' : g.meta >= 75 ? 'good' : 'ok'}">${g.meta}</span>` : '<span style="color:var(--text3);font-size:0.68rem">—</span>'}</td>
      <td style="white-space:nowrap;color:var(--text2);font-size:0.72rem">${g.hltb != null ? `~${g.hltb}h` : '<span style="color:var(--text3)">—</span>'}</td>
      <td class="td-notes">${g.notes}</td>
      <td>
        <button class="btn-played ${isPlayed ? 'played' : ''}" onclick="togglePlayed('${safeName}', this)">
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M20 6L9 17l-5-5"/></svg>
          ${isPlayed ? 'Done' : 'Not Yet'}
        </button>
      </td>`;

    // Drag-to-reorder (only active in mylist view)
    if (inList) {
      tr.addEventListener('dragstart', e => {
        e.dataTransfer.effectAllowed = 'move';
        e.dataTransfer.setData('text/plain', g.name);
        tr.classList.add('dragging');
      });
      tr.addEventListener('dragend', () => tr.classList.remove('dragging'));
      tr.addEventListener('dragover', e => { e.preventDefault(); tr.classList.add('drag-over'); });
      tr.addEventListener('dragleave', () => tr.classList.remove('drag-over'));
      tr.addEventListener('drop', e => {
        e.preventDefault();
        tr.classList.remove('drag-over');
        const fromName = e.dataTransfer.getData('text/plain');
        const toName = g.name;
        if (fromName === toName) return;
        const fromIdx = myList.indexOf(fromName);
        const toIdx = myList.indexOf(toName);
        if (fromIdx === -1 || toIdx === -1) return;

        // Update myList order
        myList.splice(fromIdx, 1);
        myList.splice(toIdx, 0, fromName);
        localStorage.setItem('gametracker_list', JSON.stringify(myList));

        // Surgically reorder rows in the DOM — no full rebuild
        const tbody = document.getElementById('game-body');
        const fromRow = tbody.querySelector(`tr[data-name="${fromName.replace(/"/g, '\\"')}"]`);
        const toRow = tbody.querySelector(`tr[data-name="${toName.replace(/"/g, '\\"')}"]`);
        if (!fromRow || !toRow) return;

        // Kill animation before moving so there's no slide/fade
        fromRow.style.animation = 'none';

        if (fromIdx < toIdx) {
          toRow.after(fromRow);
        } else {
          toRow.before(fromRow);
        }

        // Update the # position numbers in every My List row
        const allRows = Array.from(tbody.querySelectorAll('tr:not(.hidden)'));
        let pos = 1;
        allRows.forEach(row => {
          const name = row.dataset.name;
          if (myList.includes(name)) {
            const posCell = row.querySelector('.td-pos span');
            if (posCell) {
              // Replace just the text node (last child) which is the number
              const children = Array.from(posCell.childNodes);
              const textNode = children.find(n => n.nodeType === 3);
              if (textNode) textNode.textContent = pos;
            }
            pos++;
          }
        });
      });
    }

    tbody.appendChild(tr);
  });

  document.getElementById('empty-state').classList.toggle('visible', visible === 0);
  updateStats();
  renderMyList();
}

function togglePlayed(name, btn) {
  const idx = playedList.indexOf(name);
  const nowPlayed = idx === -1;
  if (nowPlayed) {
    playedList.push(name);
  } else {
    playedList.splice(idx, 1);
  }
  localStorage.setItem('gametracker_played', JSON.stringify(playedList));

  // Update button in place
  btn.classList.toggle('played', nowPlayed);
  btn.innerHTML = `<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M20 6L9 17l-5-5"/></svg>${nowPlayed ? 'Done' : 'Not Yet'}`;

  // Update row class
  const row = document.querySelector(`#game-body tr[data-name="${name.replace(/"/g, '\\"')}"]`);
  if (row) {
    row.classList.toggle('played', nowPlayed);
    // Update inline badge in name cell
    const nameLink = row.querySelector('.td-name a');
    const existingBadge = nameLink.querySelector('.played-badge');
    if (nowPlayed && !existingBadge) {
      const badge = document.createElement('span');
      badge.className = 'played-badge';
      badge.textContent = '✓ Played';
      nameLink.appendChild(badge);
    } else if (!nowPlayed && existingBadge) {
      existingBadge.remove();
    }
    // Hide row if filter is active and no longer matches
    if (currentFilter === 'played' && !nowPlayed) {
      row.classList.add('hidden');
      const visible = document.querySelectorAll('#game-body tr:not(.hidden)').length;
      document.getElementById('empty-state').classList.toggle('visible', visible === 0);
    }
  }

  updateStats();
}

function toggleList(name, btn) {
  const idx = myList.indexOf(name);
  if (idx === -1) {
    myList.push(name);
    btn.classList.add('added');
  } else {
    myList.splice(idx, 1);
    btn.classList.remove('added');
  }
  localStorage.setItem('gametracker_list', JSON.stringify(myList));
  updateStats();
  const rows = document.querySelectorAll('#game-body tr');
  rows.forEach(r => {
    if (r.dataset.name === name) r.classList.toggle('in-list', myList.includes(name));
  });
  if (currentFilter === 'mylist') buildTable();
}

function toggleListByName(name) {
  const idx = myList.indexOf(name);
  if (idx !== -1) myList.splice(idx, 1);
  localStorage.setItem('gametracker_list', JSON.stringify(myList));
  buildTable();
}

function updateStats() {
  document.getElementById('stat-total').textContent = GAMES.length;
  document.getElementById('stat-released').textContent = GAMES.filter(g => g.status === 'released').length;
  document.getElementById('stat-upcoming').textContent = GAMES.filter(g => g.status !== 'released').length;
  document.getElementById('stat-mylist').textContent = myList.length;
  document.getElementById('stat-played').textContent = playedList.length;
}

function filterGames() { buildTable(); }

function setFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('game-table').classList.toggle('mylist-view', f === 'mylist');
  buildTable();
}

function sortTable(col) {
  if (sortCol === col) sortDir *= -1;
  else { sortCol = col; sortDir = 1; }
  document.querySelectorAll('th').forEach(t => t.classList.remove('sorted'));
  event.currentTarget.classList.add('sorted');
  buildTable();
}

buildTable();

// Scroll to top
const backToTopBtn = document.getElementById('back-to-top');
if (backToTopBtn) {
  backToTopBtn.onclick = () => {
    window.scrollTo({ top: 0, behavior: 'smooth' });
    document.documentElement.scrollTop = 0;
    document.body.scrollTop = 0;
  };
}
